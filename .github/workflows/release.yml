name: Release

on:
  push:
    branches: [main]

# Cancel an in-flight release if a newer commit lands on main.
concurrency: release

permissions:
  contents: write # create tags, push the version PR, cut GitHub Releases
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # When changesets exist: open/update the Version Packages PR.
      # When that PR merges (no changesets left): run `pnpm release` to publish.
      - uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
